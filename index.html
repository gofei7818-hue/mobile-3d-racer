<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>3D Racer (Mobile Web)</title>
  <style>
    html, body { margin:0; padding:0; height:100%; background:#0b0f14; overflow:hidden; touch-action:none; }
    #c { width:100vw; height:100vh; display:block; }
    #hud { position:fixed; left:0; top:0; right:0; pointer-events:none; padding:max(10px,env(safe-area-inset-top)) 12px 10px; color:#e7eef7; font:14px/1.25 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif; text-shadow:0 1px 2px rgba(0,0,0,.6); }
    #hudRow { display:flex; gap:10px; flex-wrap:wrap; }
    .pill { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.10); border-radius:999px; padding:6px 10px; }
    #controls { position:fixed; left:0; right:0; bottom:0; padding:0 12px max(12px,env(safe-area-inset-bottom)) 12px; display:flex; gap:10px; pointer-events:auto; }
    .panel { flex:1; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); border-radius:14px; padding:10px; }
    .row { display:flex; gap:8px; }
    button { border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.1); color:#e7eef7; border-radius:12px; padding:12px; font-size:15px; font-weight:700; min-height:48px; flex:1; touch-action:none; -webkit-tap-highlight-color:transparent; }
    button:active { transform: translateY(1px); }
    #topBtns { position:fixed; right:12px; top:max(10px,env(safe-area-inset-top)); display:flex; gap:8px; }
    #overlay,#rotateTip { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.58); color:#e7eef7; z-index:10; }
    #rotateTip { display:none; z-index:11; text-align:center; padding:20px; }
    #card { width:min(560px,100%); background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14); border-radius:16px; padding:16px; }
  </style>
  <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud"><div id="hudRow"><div class="pill" id="speed">速度: 0 km/h</div><div class="pill" id="dist">距离: 0 m</div><div class="pill" id="score">得分: 0</div><div class="pill" id="time">时间: 00:00.000</div></div><div id="status"></div></div>
  <div id="topBtns"><button id="btnPause">⏸</button><button id="btnReset">↺</button></div>
  <div id="controls">
    <div class="panel"><div class="row"><button id="btnLeft">← 左转</button><button id="btnRight">右转 →</button></div></div>
    <div class="panel"><div class="row"><button id="btnAccel">加速</button><button id="btnBrake">刹车/倒车</button></div></div>
  </div>
  <div id="overlay"><div id="card"><h2>3D Racer 手机版</h2><p>加载完成后点击开始。推荐横屏体验，支持 Safari/Chrome。</p><button id="startBtn">Start Game</button></div></div>
  <div id="rotateTip"><div><h3>建议横屏游玩</h3><p>当前竖屏也可玩，但横屏视野更好。</p></div></div>
  <script type="module">
    import * as THREE from "three";
    const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
    const lerp = (a,b,t)=>a+(b-a)*t;
    const fmtTime = (t)=>{const ms=Math.round(t*1000),m=Math.floor(ms/60000),s=Math.floor(ms%60000/100),r=ms%1000;return `${String(m).padStart(2,"0")}:${String(Math.floor((ms%60000)/1000)).padStart(2,"0")}.${String(r).padStart(3,"0")}`};

    const $=(id)=>document.getElementById(id);
    const elSpeed=$("speed"),elDist=$("dist"),elScore=$("score"),elTime=$("time"),elStatus=$("status");
    const overlay=$("overlay"),rotateTip=$("rotateTip"),startBtn=$("startBtn"),btnPause=$("btnPause"),btnReset=$("btnReset");
    const btnLeft=$("btnLeft"),btnRight=$("btnRight"),btnAccel=$("btnAccel"),btnBrake=$("btnBrake");

    const canvas=$("c");
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,1.6));
    renderer.setSize(innerWidth,innerHeight);
    const scene=new THREE.Scene(); scene.background=new THREE.Color(0x87bde7);
    const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
    const clock=new THREE.Clock();
    scene.add(new THREE.HemisphereLight(0xffffff,0x2a3f2f,1.1));
    const sun=new THREE.DirectionalLight(0xffffff,0.5); sun.position.set(50,80,20); scene.add(sun);

    const outer={w:120,h:84},inner={w:66,h:34}; const hoW=outer.w/2,hoH=outer.h/2,hiW=inner.w/2,hiH=inner.h/2;
    const startZ=-hiH;
    const ground=new THREE.Mesh(new THREE.PlaneGeometry(420,420),new THREE.MeshLambertMaterial({color:0x2e6b33})); ground.rotation.x=-Math.PI/2; scene.add(ground);
    const road=new THREE.Mesh(new THREE.PlaneGeometry(outer.w,outer.h),new THREE.MeshLambertMaterial({color:0x2e313a})); road.rotation.x=-Math.PI/2; road.position.y=.02; scene.add(road);
    const mid=new THREE.Mesh(new THREE.PlaneGeometry(inner.w,inner.h),new THREE.MeshLambertMaterial({color:0x3b8a3d})); mid.rotation.x=-Math.PI/2; mid.position.y=.03; scene.add(mid);

    function mkCar(c){const g=new THREE.Group(); const body=new THREE.Mesh(new THREE.BoxGeometry(2,0.9,4),new THREE.MeshLambertMaterial({color:c})); body.position.y=.55; g.add(body); return g;}
    const car=mkCar(0xff3b30); const ai=mkCar(0x4aa3ff); scene.add(car,ai);

    const coneGeo=new THREE.ConeGeometry(.7,1.4,8),coneMat=new THREE.MeshLambertMaterial({color:0xffa43a});
    const obstacles=[];
    for(let i=0;i<16;i++){const m=new THREE.Mesh(coneGeo,coneMat); m.position.set((i%2?1:-1)*(hiW+4.2),0.7,lerp(-hiH+4,hiH-4,i/15)); scene.add(m); obstacles.push(m);}

    const player={x:-2,z:startZ+8,vx:0,vz:0,yaw:Math.PI,speed:0,alive:true,offTrackTime:0};
    const settings={accel:24,brake:30,max:34,turnRate:2.4,drag:1.45,grip:8.2};
    const input={steerTarget:0,steer:0,accel:0,brake:0};
    let started=false,paused=false,gameOver=false,time=0,distance=0,score=0;

    function onTrack(x,z){const inOuter=Math.abs(x)<=hoW&&Math.abs(z)<=hoH,inInner=Math.abs(x)<=hiW&&Math.abs(z)<=hiH; return inOuter&&!inInner;}
    function setStatus(t){elStatus.textContent=t;}

    function hold(btn,down,up){
      btn.addEventListener("pointerdown",e=>{e.preventDefault(); btn.setPointerCapture?.(e.pointerId); down();});
      ["pointerup","pointercancel","pointerleave"].forEach(ev=>btn.addEventListener(ev,e=>{e.preventDefault(); up();}));
      btn.addEventListener("contextmenu",e=>e.preventDefault());
    }
    hold(btnLeft,()=>input.steerTarget=-1,()=>{if(input.steerTarget<0) input.steerTarget=0;});
    hold(btnRight,()=>input.steerTarget=1,()=>{if(input.steerTarget>0) input.steerTarget=0;});
    hold(btnAccel,()=>input.accel=1,()=>input.accel=0);
    hold(btnBrake,()=>input.brake=1,()=>input.brake=0);

    addEventListener("keydown",e=>{if(e.code==="ArrowLeft"||e.code==="KeyA")input.steerTarget=-1; if(e.code==="ArrowRight"||e.code==="KeyD")input.steerTarget=1; if(e.code==="ArrowUp"||e.code==="KeyW")input.accel=1; if(e.code==="ArrowDown"||e.code==="KeyS")input.brake=1;});
    addEventListener("keyup",e=>{if(["ArrowLeft","KeyA"].includes(e.code)&&input.steerTarget<0)input.steerTarget=0; if(["ArrowRight","KeyD"].includes(e.code)&&input.steerTarget>0)input.steerTarget=0; if(["ArrowUp","KeyW"].includes(e.code))input.accel=0; if(["ArrowDown","KeyS"].includes(e.code))input.brake=0;});

    btnPause.onclick=()=>{if(!started||gameOver)return; paused=!paused; btnPause.textContent=paused?"▶":"⏸"; setStatus(paused?"已暂停":"继续比赛");};
    btnReset.onclick=()=>resetGame();
    startBtn.onclick=()=>{overlay.style.display="none"; resetGame(); started=true;};

    function resetGame(){player.x=-2;player.z=startZ+8;player.vx=0;player.vz=0;player.yaw=Math.PI;player.alive=true;player.offTrackTime=0;time=0;distance=0;score=0;gameOver=false;paused=false;btnPause.textContent="⏸";setStatus("开始！");}

    function update(dt){if(!started||paused||gameOver)return;
      time+=dt;
      // 中文注释：方向盘回正 + 惯性平滑，避免瞬间打满
      input.steer=lerp(input.steer,input.steerTarget,1-Math.exp(-8*dt));
      const fx=Math.sin(player.yaw),fz=Math.cos(player.yaw);
      let acc=input.accel*settings.accel-input.brake*settings.brake;
      const sp=Math.hypot(player.vx,player.vz); if(sp>settings.max&&acc>0) acc=0;
      player.vx+=fx*acc*dt; player.vz+=fz*acc*dt;
      const turn=settings.turnRate*(0.35+0.65*clamp(sp/settings.max,0,1)); player.yaw+=input.steer*turn*dt;
      player.vx*=Math.exp(-settings.drag*dt); player.vz*=Math.exp(-settings.drag*dt);
      const rx=Math.sin(player.yaw+Math.PI/2),rz=Math.cos(player.yaw+Math.PI/2),side=player.vx*rx+player.vz*rz;
      player.vx-=rx*side*(1-Math.exp(-settings.grip*dt)); player.vz-=rz*side*(1-Math.exp(-settings.grip*dt));
      player.x+=player.vx*dt; player.z+=player.vz*dt;
      if(!onTrack(player.x,player.z)){
        player.offTrackTime += dt;
        player.vx*=Math.exp(-2.2*dt); player.vz*=Math.exp(-2.2*dt); score=Math.max(0,score-2); setStatus("冲出赛道，速度受损");
        if (player.offTrackTime > 2.8) { gameOver = true; setStatus("长时间出界，游戏结束"); }
      } else {
        player.offTrackTime = 0;
      }

      for(const o of obstacles){if(Math.hypot(player.x-o.position.x,player.z-o.position.z)<1.6){gameOver=true; setStatus("撞到障碍物，游戏结束");}}
      distance += Math.hypot(player.vx,player.vz)*dt; score=Math.max(0,Math.floor(distance*0.7-time*0.5));
      const t=(time*0.07)%1, laneW=(hiW+hoW)/2,laneH=(hiH+hoH)/2,per=2*(2*laneW+2*laneH),d=t*per;
      if(d<2*laneW){ai.position.set(-laneW+d,0,-laneH);} else if(d<2*laneW+2*laneH){ai.position.set(laneW,0,-laneH+(d-2*laneW));} else if(d<4*laneW+2*laneH){ai.position.set(laneW-(d-2*laneW-2*laneH),0,laneH);} else {ai.position.set(-laneW,0,laneH-(d-4*laneW-2*laneH));}
    }

    const camPos = new THREE.Vector3();
    const camLook = new THREE.Vector3();
    function render(dt){car.position.set(player.x,0,player.z); car.rotation.y=player.yaw;
      const fx=Math.sin(player.yaw),fz=Math.cos(player.yaw);
      camPos.set(player.x-fx*9,6.6,player.z-fz*9);
      camLook.set(player.x+fx*5,1.2,player.z+fz*5);
      camera.position.lerp(camPos,1-Math.exp(-7*dt));
      camera.lookAt(camLook); renderer.render(scene,camera);
    }
    function hud(){const v=Math.hypot(player.vx,player.vz); elSpeed.textContent=`速度: ${Math.round(v*3.6)} km/h`; elDist.textContent=`距离: ${Math.round(distance)} m`; elScore.textContent=`得分: ${score}`; elTime.textContent=`时间: ${fmtTime(time)}`;}
    function resize(){renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,1.6)); renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); rotateTip.style.display=(innerHeight>innerWidth)?"flex":"none";}
    addEventListener("resize",resize); resize();
    document.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});

    (function loop(){const dt=Math.min(clock.getDelta(),0.033); update(dt); render(dt); hud(); requestAnimationFrame(loop);})();
  </script>
</body>
</html>
