<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b0f14" />
  <title>3D Racer (Mobile Web)</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles/game.css" />
  <script type="importmap">
    {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud"><div id="hudRow"><div class="pill" id="speed">Speed: 0 km/h</div><div class="pill" id="lap">Lap: 0/3</div><div class="pill" id="time">Time: 00:00.000</div><div class="pill" id="best">Best: --:--.---</div></div><div id="status"></div></div>
  <div id="topBtns"><button id="btnHelp">?</button><button id="btnPause">⏸</button><button id="btnReset">↺</button></div>
  <div id="help"><h3>触控说明</h3><p>左侧：在“转向区”左右拖动（越远越急）</p><p>右侧：加速/刹车按钮；HB 手刹可漂移</p><p>目标：3 圈内跑出最佳圈速</p></div>
  <div id="controls"><div class="panel" id="leftPanel"><div class="title">转向</div><div id="steerArea"><div id="steerDot"></div></div></div><div class="panel" id="rightPanel"><div class="title">动力</div><div class="row"><button id="btnAccel" class="big">加速</button><button id="btnBrake" class="big">刹车</button></div><div class="row" style="margin-top:10px;"><button id="btnHB">HB 手刹</button><button id="btnCam">视角</button></div></div></div>
  <div id="overlay"><div id="card"><h2>3D Racer（手机网页版）</h2><div style="opacity:.92">这是一个<strong>可直接在手机浏览器玩</strong>的 3D 赛车小游戏（WebGL）。<br/>如果你看到黑屏：请用 Safari/Chrome 打开，且保持网络可访问 unpkg（Three.js CDN）。</div><ul><li>AI 对手 + 计圈 + HUD</li><li>触控操控：转向/油门/刹车/手刹</li><li>支持“添加到主屏幕”当 App 用</li></ul><button id="startBtn" class="big">开始游戏</button></div></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
